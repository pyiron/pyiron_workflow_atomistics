channels:
  - conda-forge

dependencies:
  # Core Python version
  - python>=3.9,<3.13

  # Conda-forge packages
  - numpy<2.0.0
  - pandas>=1.3.0
  - matplotlib>=3.4.0
  - ase>=3.22.0
  - scipy>=1.7.0
  - scikit-learn>=1.0.0
  - pip
  - pymatgen>=2024.8.8
  - pyiron_workflow
  - pyiron_snippets
  - tqdm

  # Test runners / notebook execution
  - pytest
  - pytest-cov
  - pyscal3  # used by structure/defects.py void-analysis helpers (Tier 2 tests)
  - structuretoolkit  # CNA + Voronoi descriptors for analysis/ + physics/melting/
  - nbformat
  - nbclient

  # Optional [phonons] / [phonons-md] extras — needed for the phono3py and
  # dynaphopy example notebooks plus their integration tests.
  - phonopy
  - phono3py
  - symfc
  - dynaphopy

  # PyPI-only deps (not on conda-forge)
  - pip:
    - lz-GB-code==0.1.0
